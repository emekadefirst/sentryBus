name = "blnk-ledger"
enabled = true
protocol = "http"
baseUrl = "http://localhost:5001"
timeoutMs = 8000
credentialKey = "your-custom-master-key-here"
topics = ["shipment.delivered", "invoice.due", "payment.initiated", "payment.confirmed"]
envelopeVersion = "1.0"

# # Blnk calls back with async transaction-state changes, so this adapter is
# # bidirectional — the webhook fields are required here (unlike outbound-only Zoho).
# webhookRoute = "/webhooks/blnk"
# webhookSecret = "BLNK_WEBHOOK_SIGNING_SECRET"

[rateLimit]
burst = 10
refillPerSecond = 2

[retry]
maxAttempts = 8
backoff = "exponential"
baseDelayMs = 1000
jitter = true

[circuitBreaker]
failureThreshold = 3
windowMs = 60000
cooldownMs = 45000
