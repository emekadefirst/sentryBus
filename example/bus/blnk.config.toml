name = "blnk-ledger"
enabled = true
protocol = "http"
baseUrl = "https://ledger.internal.example.com"
timeoutMs = 8000
credentialKey = "BLNK_API_KEY"
topics = ["shipment.delivered", "invoice.due"]
envelopeVersion = "1.0"

# Blnk calls back with async transaction-state changes, so this adapter is
# bidirectional — the webhook fields are required here (unlike outbound-only Zoho).
webhookRoute = "/webhooks/blnk"
webhookSecret = "BLNK_WEBHOOK_SIGNING_SECRET"

[rateLimit]
burst = 10
refillPerSecond = 2

[retry]
maxAttempts = 8
backoff = "exponential"
baseDelayMs = 1000
jitter = true

[circuitBreaker]
failureThreshold = 3
windowMs = 60000
cooldownMs = 45000
